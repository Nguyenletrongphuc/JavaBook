<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Sách Mới</title>
    <link rel="stylesheet" href="/static/bootstrap-5.3.8-dist/bootstrap/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Georgia', serif;
        }

        nav {
            background-color: #1a1a2e;
            border-bottom: 3px solid #e94560;
            padding: 12px 0;
        }

        nav a {
            color: #cccccc;
            text-decoration: none;
            margin: 0 16px;
            font-size: 1rem;
            transition: color 0.2s;
        }

        nav a:hover, nav a.active {
            color: #e94560;
        }

        nav .brand {
            color: #ffffff;
            font-weight: bold;
            font-size: 1.3rem;
        }

        .form-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 40px;
            max-width: 560px;
            margin: 60px auto;
        }

        .form-card h2 {
            color: #1a1a2e;
            font-weight: bold;
            margin-bottom: 28px;
            font-size: 1.6rem;
        }

        .form-label {
            font-weight: 600;
            color: #333;
        }

        .form-control {
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 10px 14px;
            font-size: 0.95rem;
            transition: border 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            border-color: #e94560;
            box-shadow: 0 0 0 3px rgba(233,69,96,0.15);
            outline: none;
        }

        .btn-submit {
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 28px;
            font-size: 1rem;
            width: 100%;
            margin-top: 8px;
            transition: background 0.2s;
            cursor: pointer;
        }

        .btn-submit:hover { background-color: #c0392b; }

        .btn-back {
            background-color: #f0f0f0;
            color: #333;
            border: none;
            border-radius: 8px;
            padding: 10px 28px;
            font-size: 1rem;
            width: 100%;
            margin-top: 10px;
            transition: background 0.2s;
            cursor: pointer;
        }

        .btn-back:hover { background-color: #ddd; }

        .alert-box {
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: none;
        }

        .alert-success { background-color: #d4edda; color: #155724; }
        .alert-error   { background-color: #f8d7da; color: #721c24; }

        footer {
            background-color: #1a1a2e;
            color: #aaaaaa;
            text-align: center;
            padding: 20px 0;
            margin-top: 60px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav>
    <div class="container d-flex align-items-center">
        <span class="brand me-4">📚 JavaBook</span>
        <a href="Index.html">Trang chủ</a>
        <a href="Add.html" class="active">Thêm mới</a>
    </div>
</nav>

<!-- Form -->
<div class="container">
    <div class="form-card">
        <h2>📖 Thêm Sách Mới</h2>

        <div id="alertBox" class="alert-box"></div>

        <div class="mb-3">
            <label class="form-label">Tên sách <span class="text-danger">*</span></label>
            <input type="text" id="name" class="form-control" placeholder="Nhập tên sách...">
        </div>

        <div class="mb-3">
            <label class="form-label">Giá bán (đ) <span class="text-danger">*</span></label>
            <input type="number" id="price" class="form-control" placeholder="Nhập giá sách..." min="0">
        </div>

        <div class="mb-3">
            <label class="form-label">Mô tả</label>
            <textarea id="description" class="form-control" rows="3" placeholder="Nhập mô tả sách..."></textarea>
        </div>

        <button class="btn-submit" onclick="insertBook()">+ Thêm sách</button>
        <button class="btn-back" onclick="window.location.href='index.html'">← Trở về trang chính</button>
    </div>
</div>

<footer>
    <p>© 2026 JavaBook — Hệ thống quản lý sách</p>
</footer>

<script src="/static/bootstrap-5.3.8-dist/bootstrap/js/bootstrap.bundle.min.js"></script>
<script>
    async function insertBook() {
        const name        = document.getElementById("name").value.trim();
        const price       = document.getElementById("price").value.trim();
        const description = document.getElementById("description").value.trim();

        if (!name || !price) {
            showAlert("error", "⚠️ Vui lòng điền đầy đủ tên sách và giá!");
            return;
        }

        const newBook = { name, price: parseFloat(price), description };

        try {
            const response = await fetch("http://localhost:8080/api/v1/books/insert", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(newBook)
            });

            if (!response.ok) {
                const errText = await response.text();
                showAlert("error", "⚠️ Lỗi: " + errText);
                return;
            }

            showAlert("success", "✅ Thêm sách thành công!");

            // Reset form
            document.getElementById("name").value = "";
            document.getElementById("price").value = "";
            document.getElementById("description").value = "";

        } catch (error) {
            showAlert("error", "⚠️ Không thể kết nối tới server!");
        }
    }

    function showAlert(type, message) {
        const box = document.getElementById("alertBox");
        box.className = "alert-box " + (type === "success" ? "alert-success" : "alert-error");
        box.innerText = message;
        box.style.display = "block";

        setTimeout(() => { box.style.display = "none"; }, 4000);
    }
</script>
</body>
</html>
